name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      base_release_created: ${{ steps.release.outputs.base--release_created }}
      kart_release_created: ${{ steps.release.outputs.kart--release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-base:
    needs: release-please
    if: ${{ needs.release-please.outputs.base_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run build -w base

      - name: Publish to GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kystverket'
      - run: npm publish -w base
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.org (tokenless OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@kystverket'
      - run: rm -f .npmrc
      - run: npm install -g npm@latest
      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      - run: npm publish -w base --access public

  publish-kart:
    needs: release-please
    if: ${{ needs.release-please.outputs.kart_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run build

      - name: Publish to GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kystverket'
      - run: npm publish -w kart
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.org (tokenless OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@kystverket'
      - run: rm -f .npmrc
      - run: npm install -g npm@latest
      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      - run: npm publish -w kart --access public

  deploy-storybook:
    needs: release-please
    if: ${{ needs.release-please.outputs.base_release_created == 'true' || needs.release-please.outputs.kart_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Installere dependencies
        run: |
          npm ci --ignore-scripts
      - name: Bygge base pakke
        run: |
          npm run build --workspace base
      - name: Eksportere statisk data
        run: node --experimental-strip-types ./base/scripts/export-ship-types-json.mjs
      - name: Bygge Storybooks
        run: |
          npm run storybook:build
          cp -r ./base/storybook-static ./github-pages-root/base
          cp -r ./kart/storybook-static ./github-pages-root/kart
      - name: Laste opp til GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./github-pages-root
