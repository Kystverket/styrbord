      <style>
  button[aria-label="Expand all"],
  button[title="Expand all"] {
    display: none !important;
  }

  button[aria-label="Collapse"]:hover {
    background: #d4f2fd !important;
    color: #000667 !important;
  }

  button[aria-label="Expand"]:hover {
    background: #d4f2fd !important;
    color: #000667 !important;
  }

  #root > div {
    padding: 21px !important;
  }

  #storybook-explorer-menu button,
  #storybook-explorer-menu a {
    border-left: none !important;
    border-radius: 4px !important;
  }

  #root > div > * {
    border-radius: 6px !important;
    border: 1px solid color-mix(in hsl, currentcolor, transparent 90%);
    overflow: hidden;
  }

  #root > div > :has(.sidebar-container) {
    border: 0;
    overflow: visible;
  }

  #root div:has(+ .sidebar-container)::after {
    opacity: 0 !important;
  }

  #root .sb-bar {
    box-shadow: none !important;
  }
  #storybook-preview-iframe {
    outline: 1px solid rgb(0 0 0 / 0.2);
  }

  .css-1s8d7l5 {
    padding: 0 !important;
    padding-right: 21px !important;
  }

  .sidebar-container.sidebar-container .sidebar-header ~ *, /* Hide install guide for authors */
  .sidebar-container.sidebar-container #storybook-explorer-searchfield ~ *, /* Search help */
  .sidebar-container.sidebar-container .search-field + button, /* Disable "Create new story" <button> */
  .sidebar-container.sidebar-container .sidebar-header button, /* Hide settings */
  .sidebar-container.sidebar-container svg[type], /* Hide sidebar type icons */
  .sidebar-container.sidebar-container button[data-action="expand-all"], /* Hide expand <button> */
  .sidebar-container.sidebar-container button[title="Tag filters"], /* Hide filter tags <button> */
  .sidebar-container.sidebar-container button[role="switch"][aria-label*="review" i], /* Hide review stories button */
  .sidebar-container.sidebar-container [data-displayed], /* Hide "Open in edtior" context menu in sidebar */
  .sb-bar.sb-bar button[aria-label="Open in editor"], /* Hide "Open in edtior" (new markup) */
  .sb-bar.sb-bar button[title="Open in editor"] /* Hide "Open in edtior" (old markup) */ {
    display: none !important;
  }

  .sidebar-container {
    color: #2a2b35;
  }

  .sidebar-container .sidebar-header a {
    font-size: 20px;
  }

  .sidebar-container .sidebar-item :is(a, button) {
    align-items: center;
    font: inherit;
    font-weight: 400;
  }
  .sidebar-container .sidebar-item a {
    gap: 0;
  }
  .sidebar-container .sidebar-item:hover {
    background: #d4f2fd;
  }
  .sidebar-container .sidebar-item,
  .sidebar-container .sidebar-subheading,
  .sidebar-container .search-result-item--label > * {
    color: inherit;
    font-size: 14px !important;
    letter-spacing: 0;
    line-height: 1.5;
    text-transform: none;
  }

  .sidebar-item[data-selected="true"] {
    background: #000667 !important;
  }

  .sidebar-container
    .search-result-item:is([data-id$="--default"], [data-id$="--docs"])
    .search-result-item--label
    > :first-child {
    display: none;
  }

  .sidebar-container .search-result-item--label > :last-child {
    display: flex;
    gap: 4px;
  }

  .search-field.search-field {
    box-shadow: none;
    position: relative;
    border: 1px solid #bbbbc1 !important;
    border-radius: 2px !important;
    margin: 0 0 0 8px !important;
    height: 42px !important;
  }

  .search-field.search-field:focus-within {
    outline: 2px solid #000667 !important;
    border-color: #000667 !important;
  }

  .search-field.search-field #storybook-explorer-searchfield {
    font: inherit;
  }
  .search-field.search-field #storybook-explorer-searchfield::placeholder {
    color: transparent;
  }
  .search-field.search-field:has(
      #storybook-explorer-searchfield:placeholder-shown
    )::before {
    content: "Søk...";
    margin-left: 32px !important;
    opacity: 0.8;
    position: absolute;
  }

  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="component"],
  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="group"] {
    background: revert !important;
  }

  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="component"]:hover,
  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="group"]:hover {
    background: #d4f2fd !important;
  }
  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="component"]:focus,
  [data-ref-id="storybook_internal"]:not(
      [data-selected="true"]
    )[data-nodetype="group"]:focus {
    background: #d4f2fd !important;
  }
</style>
